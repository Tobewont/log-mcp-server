version: '3.8'

services:
  # Log MCP Server (defaults to streamable-http transport on /mcp)
  log-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: log-mcp-server:latest
    container_name: log-mcp-server
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      # MCP transport
      - MCP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}
      - MCP_HOST=${MCP_HOST:-0.0.0.0}
      - MCP_PORT=${MCP_PORT:-8000}
      - MCP_PATH=${MCP_PATH:-/mcp}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # Backend selection
      - LOG_BACKEND=${LOG_BACKEND:-loki}

      # Loki backend (use '|' as separator for multiple Loki instances)
      - LOKI_ADDR=${LOKI_ADDR:-http://loki:3100}
      - LOKI_TENANTS=${LOKI_TENANTS:-fake}
      - LOKI_USERNAME=${LOKI_USERNAME:-}
      - LOKI_PASSWORD=${LOKI_PASSWORD:-}
      - LOKI_BEARER_TOKEN=${LOKI_BEARER_TOKEN:-}
      - LOKI_TLS_SKIP_VERIFY=${LOKI_TLS_SKIP_VERIFY:-false}
      - LOKI_CONNECT_TIMEOUT=${LOKI_CONNECT_TIMEOUT:-10.0}
      - LOKI_READ_TIMEOUT=${LOKI_READ_TIMEOUT:-15.0}

      # Client-side tenant scope (REQUIRED for log-query tools).
      # In HTTP mode (the default below) MCP clients send the
      # X-Allowed-Tenants header per request and this env is unused.
      # Only set this when running the container in stdio mode.
      # - LOKI_CLIENT_TENANTS=${LOKI_CLIENT_TENANTS:-}

      # Generic
      - LOG_DEFAULT_LIMIT=${LOG_DEFAULT_LIMIT:-100}
      - LOG_MAX_LIMIT=${LOG_MAX_LIMIT:-5000}
      - LOG_DEFAULT_TIME_RANGE_MINUTES=${LOG_DEFAULT_TIME_RANGE_MINUTES:-30}
      - LOG_TIMEZONE=${LOG_TIMEZONE:-Asia/Shanghai}

    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs

    networks:
      - log-mcp-network

    depends_on:
      loki:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',8000))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Local Loki instance for development/testing
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    restart: unless-stopped

    command: -config.file=/etc/loki/local-config.yaml

    ports:
      - "3100:3100"

    volumes:
      - loki-data:/loki
      - ./docker/loki-config.yaml:/etc/loki/local-config.yaml:ro

    networks:
      - log-mcp-network

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Optional: Grafana for log visualisation
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro

    networks:
      - log-mcp-network

    depends_on:
      loki:
        condition: service_healthy

    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

networks:
  log-mcp-network:
    driver: bridge
    name: log-mcp-network

volumes:
  loki-data:
    name: loki-data
    driver: local
  grafana-data:
    name: grafana-data
    driver: local
