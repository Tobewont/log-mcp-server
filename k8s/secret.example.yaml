# Example secret. Copy to `secret.yaml`, fill in real values, do NOT commit.
# Use `kubectl create secret generic log-mcp-server-secrets --from-literal=...`
# in production CI/CD instead of committing rendered manifests.
apiVersion: v1
kind: Secret
metadata:
  name: log-mcp-server-secrets
  namespace: log-mcp
  labels:
    app.kubernetes.io/name: log-mcp-server
type: Opaque
stringData:
  # Choose ONE authentication method for Loki.
  # ---- Basic auth ------------------------------------------------------
  # LOKI_USERNAME: "your-username"
  # LOKI_PASSWORD: "your-password"

  # ---- Bearer token ----------------------------------------------------
  # LOKI_BEARER_TOKEN: "your-loki-token"

  # Empty placeholders so the deployment doesn't fail when no auth is used.
  LOKI_USERNAME: ""
  LOKI_PASSWORD: ""
  LOKI_BEARER_TOKEN: ""
