# Loki MCP Server Configuration
# This file provides an example configuration for the FastMCP-based Loki MCP Server

# FastMCP configuration (optional - FastMCP auto-detects mode)
fastmcp_debug: false      # Enable debug mode
fastmcp_host: "127.0.0.1" # Host for HTTP mode (when port specified)
fastmcp_port: 8000        # Port for HTTP mode (omit for stdio mode)

# Loki server connection
addr: "http://localhost:3100"

# Multi-tenant configuration
# Single tenant (default)
tenants: "fake"

# Multiple tenants (separated by |)
# tenants: "tenant1|tenant2|tenant3"

# Authentication (choose one method)
# Basic authentication
# username: "your-username"
# password: "your-password"

# Bearer token authentication
# bearer_token: "your-bearer-token"
# bearer_token_file: "/path/to/token/file"


# TLS settings
# ca_file: "/path/to/ca.crt"
# cert_file: "/path/to/client.crt"
# key_file: "/path/to/client.key"
# tls_skip_verify: false

# HTTP client timeouts (in seconds)
connect_timeout: 10.0
read_timeout: 30.0
write_timeout: 10.0
pool_timeout: 10.0

# Query limits
default_limit: 100
max_limit: 5000

# Default time range settings
default_time_range_minutes: 30  # Default time range when start/end not specified

# Timezone settings
timezone: "Asia/Shanghai"  # Default timezone for time operations
