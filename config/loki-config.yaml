# Sample configuration file for log-mcp-server.
# Loaded automatically when present at:
#   $LOG_CONFIG_PATH (or $LOKI_CONFIG_PATH)
#   ./loki-config.yaml
#   ./.loki-config.yaml
#   ~/.loki-config.yaml
#
# Priority: env vars > .env file > this YAML file > built-in defaults.
# Both `loki_*` / `log_*` prefixes and bare names are accepted.

# ---- MCP transport --------------------------------------------------------
mcp_transport: "stdio"       # "stdio" | "sse" | "streamable-http"
# mcp_host / mcp_port are only used by the HTTP transports (sse,
# streamable-http); they are ignored when mcp_transport == "stdio".
mcp_host: "127.0.0.1"        # Use "0.0.0.0" for network exposure
mcp_port: 8000
log_level: "INFO"            # DEBUG / INFO / WARNING / ERROR

# ---- Backend selection ----------------------------------------------------
backend: "loki"             # Currently only "loki" is supported

# ---- Loki backend ---------------------------------------------------------
addr: "http://localhost:3100"
tenants: "fake"             # Multi: "tenant-a|tenant-b|tenant-c"

# Authentication (pick at most one)
# username: "your-username"
# password: "your-password"
# bearer_token: "your-bearer-token"
# bearer_token_file: "/path/to/token/file"

# TLS
# ca_file: "/path/to/ca.crt"
# cert_file: "/path/to/client.crt"
# key_file: "/path/to/client.key"
# tls_skip_verify: false

# HTTP timeouts (seconds)
connect_timeout: 10.0
read_timeout: 15.0
write_timeout: 10.0
pool_timeout: 10.0

# ---- Health cache (multi-cluster) ----------------------------------------
# Only used when LOKI_ADDR contains multiple pipe-separated addresses.
# Unhealthy clusters are automatically skipped for data queries.
health_check_interval: 300   # background refresh interval (seconds)
health_check_timeout: 5      # per-cluster probe timeout (seconds)

# ---- Generic query / time settings ---------------------------------------
default_limit: 100
max_limit: 5000
default_time_range_minutes: 30
timezone: "Asia/Shanghai"
